[workspace]
channels = ["conda-forge"]
description = "Transform ClinGen Genegraph JSON-LD proband data into GA4GH Phenopackets."
name = "gv-snapshot"
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]
version = "0.1.0"

[tasks]
gci_transform = {cmd = "python -m gci_phenopacket.cli", env = {PYTHONPATH = "src"}}
test = {cmd = "python -m pytest tests/ -v", env = {PYTHONPATH = "src"}}

[dependencies]
python = ">=3.10,<3.13"
jupyterlab = ">=4.2.5,<5"
pyld = ">=2.0.4,<3"
jsonpath-ng = ">=1.6.1,<2"
jupyterlab-git = ">=0.50.1,<0.51"
requests = ">=2.32.5,<3"
linkml-runtime = "<1.10"

[pypi-dependencies]
phenopackets = ">=2.0.2.post5, <3"
click = ">=8.0"
oaklib = ">=0.6"
pytest = ">=9.0.2, <10"
